<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlorMoon— Product</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header-placeholder"></div>

<section class="py-5">
    <div class="container">
        <div class="row g-5 align-items-start">

            <div class="col-md-7">
                <img id="product-image" class="img-fluid rounded shadow" alt="Product">
            </div>
                    <div class="col-md-5">
                        <h2 id="product-title" class="section-serif mb-2"></h2>
                        <p id="product-price" class="mb-3"></p>

                    <div class="product-action">
            <div class="product-action">
                <a href="#" class="btn-add-to-cart mb-3">ADD TO CART</a>
                     </div>

                <h6 class="fw-bold">DESCRIPTION</h6>
                <p id="product-description" class="text-muted"></p>
            </div>
        </div>
    </div>
</section>

<div id="footer-placeholder"></div>

<script src="products.js"></script>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
