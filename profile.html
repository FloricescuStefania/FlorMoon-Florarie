<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlorMoon — Account Information</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- header -->
    <div id="header-placeholder"></div>

    <div class="profile-page">
        <div class="profile-layout">

            <!-- SIDEBAR ---->
            <aside class="profile-sidebar">
                <div class="profile-logo">
                    <i class="fas fa-seedling"></i>
                </div>

                <div class="profile-name">Maria Ionescu</div>
                <div class="profile-email">maria@email.ro</div>

                <ul class="profile-nav">
                    <li class="profile-nav-item active">
                        <a href="#account-info" data-bs-toggle="tab">
                            <i class="fas fa-user"></i> Account Information
                        </a>
                    </li>
                    <li class="profile-nav-item">
                        <a href="#password" data-bs-toggle="tab">
                            <i class="fas fa-lock"></i> Change Password
                        </a>
                    </li>
                    <li class="profile-nav-item logout">
                        <a href="javascript:void(0)">
                            <i class="fas fa-right-from-bracket"></i> Logout
                        </a>
                    </li>
                </ul>
            </aside>

            <!---- MAIN CARD ---->
            <main class="account-card">
                <div class="tab-content">

                    <!---- Account Information ---->
                    <div class="tab-pane fade show active" id="account-info">

                        <h2 class="account-card-title">Account Information</h2>

                        <form id="profileForm">
                            <div class="field-grid">

                                <div class="field-group">
                                    <label class="field-label" for="field-nume">Nume</label>
                                    <input type="text" class="field-input" id="field-nume" value="Ionescu">
                                </div>

                                <div class="field-group">
                                    <label class="field-label" for="field-prenume">Prenume</label>
                                    <input type="text" class="field-input" id="field-prenume" value="Maria">
                                </div>

                                <div class="field-group">
                                    <label class="field-label" for="field-email">Email Address</label>
                                    <input type="email" class="field-input" id="field-email" value="maria@email.ro">
                                </div>

                                <div class="field-group">
                                    <label class="field-label" for="field-phone">Phone Number</label>
                                    <input type="tel" class="field-input" id="field-phone" value="+40 745 123 456">
                                </div>

                                <div class="field-group field-full">
                                    <label class="field-label" for="field-address">Default Address</label>
                                    <textarea class="field-input field-textarea" id="field-address" rows="3">Str. Florilor 14, Bl. A3, Ap. 7, Iași</textarea>
                                </div>

                            </div>

                            <button type="submit" class="btn-save" id="btnSave">
                                Save Changes
                            </button>
                        </form>

                    </div>

                    <!----  Change Password  ---->
                    <div class="tab-pane fade" id="password">

                        <h2 class="account-card-title">Change Password</h2>

                        <form id="passwordForm">
                            <div class="field-grid-single">

                                <div class="field-group">
                                    <label class="field-label" for="current-password">Current Password</label>
                                    <div class="input-password-wrap">
                                        <input type="password" class="field-input" id="current-password" placeholder="••••••••" required>
                                        <button type="button" class="toggle-password" data-target="current-password">
                                            <i class="fa fa-eye"></i>
                                        </button>
                                    </div>
                                </div>

                                <div class="field-group">
                                    <label class="field-label" for="new-password">New Password</label>
                                    <div class="input-password-wrap">
                                        <input type="password" class="field-input" id="new-password" placeholder="••••••••" required>
                                        <button type="button" class="toggle-password" data-target="new-password">
                                            <i class="fa fa-eye"></i>
                                        </button>
                                    </div>
                                </div>

                                <div class="field-group">
                                    <label class="field-label" for="confirm-password">Confirm New Password</label>
                                    <div class="input-password-wrap">
                                        <input type="password" class="field-input" id="confirm-password" placeholder="••••••••" required>
                                        <button type="button" class="toggle-password" data-target="confirm-password">
                                            <i class="fa fa-eye"></i>
                                        </button>
                                    </div>
                                    <div class="field-error" id="passwordError">Parolele nu coincid.</div>
                                </div>

                            </div>

                            <div class="d-flex gap-2 mt-3">
                                <button type="submit" class="btn-save" id="btnPassword">
                                    Update Password
                                </button>
                                <button type="button" class="btn-cancel" onclick="document.getElementById('passwordForm').reset()">
                                    Cancel
                                </button>
                            </div>
                        </form>

                    </div>

                </div>
            </main>

        </div>
    </div>

    <!-- Toast -->
    <div class="save-toast" id="saveToast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMsg">Changes saved successfully!</span>
    </div>

    <!-- footer -->
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
