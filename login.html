<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlorMoon — Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

     <div id="header-placeholder"></div>
     
     <section class="login-section d-flex align-items-center justify-content-center">
    <div class="login-card text-center">
        <h1 class="login-title">Log in</h1>
        <div class="login-inputs-container mt-4">
            <div class="mb-3">
                <input type="email" id="userEmail" class="form-control login-input" placeholder="Email">
            </div>
            <div class="mb-4">
                <input type="password" id="userPassword" class="form-control login-input" placeholder="Password">
            </div>
            
            <button type="button" onclick="handleLogin()" class="btn btn-login w-100">Let's start!</button>
        </div>
        <p class="signup-text mt-4">
            Don't have an account? <a href="signup.html" class="signup-link">Sign up</a>
        </p>
        
    </div>
</section>
    
  
      <!-- footer -->
    <div id="footer-placeholder"></div>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
